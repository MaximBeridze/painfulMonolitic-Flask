{% extends "base.html" %}
{% block content %}

<h1>Users</h1>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Display name</th>
            <th>Email</th>
            <th>Bio</th>
            <th>Created</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td><a href="/view/users/{{ user.id }}">{{ user.display_name }}</a></td>
            <td>{{ user.email }}</td>
            <td>{{ user.bio }}</td>
            <td>{{ user.created_at }}</td>
            <td>
                <form class="inline" action="/view/users/{{ user.id }}/delete" method="POST"
                      onsubmit="return confirm('Delete {{ user.display_name }}? This cannot be undone.')">
                    <button class="btn btn-danger btn-small" type="submit">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<div class="card">
    <h2>Add a new user</h2>
    <form action="/view/users" method="POST">
        <input type="text"  name="display_name" placeholder="Display name" required>
        <input type="email" name="email"    placeholder="Email" required>
        <input type="text"  name="bio"      placeholder="Bio (optional)">
        <label>
          <input type="checkbox" name="opted_out" value="1">
          Opt out of activity tracking
        </label>
        <label>
          <input type="checkbox" name="notifications" value="1" checked>
          Enable notifications
        </label>
        <button class="btn btn-primary" type="submit">Create user</button>
    </form>
</div>

{% endblock %}
